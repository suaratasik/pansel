<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Usulan Dewan Pakar dan Penasihat PKS</title>
  <link rel="icon" href="https://suaratasik.github.io/pansel/logopks.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .logo { width: 72px; margin-bottom: 1.25rem; }
    h1 { font-size: 1.2rem; font-weight: 600; color: #1a1a1a; margin-bottom: 0.5rem; }
    p { font-size: 0.9rem; color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: #1a5c2e;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn:hover { background: #14471f; }
    .note { font-size: 0.78rem; color: #999; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo"
      src="https://suaratasik.github.io/pansel/logopks.png"
      alt="Logo PKS" />
    <h1>Usulan Dewan Pakar &amp; Penasihat PKS</h1>
    <p>Klik tombol di bawah untuk mengakses formulir usulan secara langsung.</p>
    <a class="btn"
      href="https://script.google.com/macros/s/AKfycbx76y7mwPC6rs_vpsE8_6HARPRrVn53LWsxcapC2pB_N63dDeEqc7Tb5gi28m_g_MSnVA/exec"
      target="_blank" rel="noopener">
      Buka Formulir ↗
    </a>
    <p class="note">Akan terbuka di tab baru</p>
  </div>
</body>
</html>
